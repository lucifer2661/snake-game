<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake game </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <div class="infos">
                  <div class="info">
                    <h3>Score</h3>
                    <span id="score">0</span>
                  </div>
                   <div class="info">
                    <h3>Time</h3>
                    <span id="time">00</span>
                  </div>
                  <div class="info">
                    <h3>Best Score</h3>
                    <span id="best-score">0</span>
                  </div>

            </div>
            <div class="board">

            </div>

        </section>
       <div class="modal">
  <div class="startgame">
    <h3 class="modal-title">Welcome to Snake Game</h3>

    <div class="buttons">
      <button class="btn start-btn">Start Game</button>
      <button class="btn restart-btn hidden">Restart</button>
    </div>
  </div>
</div>
    </main>
    
</body>
<script src="script.js"></script>
</html>
